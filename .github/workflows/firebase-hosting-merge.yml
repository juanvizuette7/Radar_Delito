name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🔥 INSTALAR DEPENDENCIAS EN /web
      - name: Install dependencies
        working-directory: web
        run: npm install

      # 🔥 BUILD EN /web
      - name: Build
        working-directory: web
        run: npm run build

      # 🔥 DEPLOY DESDE /web
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CRIMINALIDAD_WEB }}
          channelId: live
          projectId: criminalidad-web
          entryPoint: web
